<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Boutons — Bayen DS</title>
<link href="https://fonts.googleapis.com/css2?family=Mouse+Memoirs&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:Nunito,system-ui,sans-serif;background:hsl(60 48% 94%);color:hsl(100 25% 12%);margin:0;padding:28px}
  h1{font-family:'Mouse Memoirs',sans-serif;font-size:2rem;margin:0 0 4px}
  .sub{color:hsl(95 12% 42%);font-size:.85rem;margin:0 0 20px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;height:40px;padding:0 16px;border-radius:10px;
    font-family:Nunito;font-weight:700;font-size:.85rem;border:0;cursor:pointer;transition:all .2s ease-out;white-space:nowrap}
  .btn:active{transform:scale(.97);transition:none}
  .btn:focus-visible{outline:2px solid hsl(97 36% 30%);outline-offset:2px}
  .primary{background:hsl(97 36% 30%);color:hsl(64 55% 90%);box-shadow:0 1px 2px hsl(97 40% 20%/.15)}
  .primary:hover{background:hsl(97 36% 26%);transform:translateY(-1px);box-shadow:0 4px 10px hsl(97 40% 20%/.2)}
  .outline{background:hsl(58 52% 97%);border:1px solid hsl(62 28% 80%);color:hsl(100 25% 12%)}
  .outline:hover{background:hsl(64 45% 85%);border-color:hsl(97 36% 30%/.3)}
  .ghost{background:transparent;color:hsl(100 25% 12%)}
  .ghost:hover{background:hsl(64 45% 85%)}
  .destructive{background:hsl(0 84% 60%);color:#fff}
  .whatsapp{background:#25D366;color:#fff}
  .whatsapp:hover{background:#1eb356;transform:translateY(-1px)}
  .ia{background:transparent;border:1px solid hsl(97 36% 30%/.3);color:hsl(97 36% 30%)}
  .ia:hover{background:hsl(97 36% 30%/.08)}
  .violet{background:#7c3aed;color:#fff}
  .pill{border-radius:999px;height:48px;padding:0 26px;background:#b1cf3a;color:#2a3f1e;font-size:.95rem;box-shadow:0 8px 20px hsl(68 60% 40%/.3)}
  .pill:hover{background:#c4de5a;transform:translateY(-1px)}
  .sm{height:34px;padding:0 12px;font-size:.78rem}
  .lg{height:46px;padding:0 26px;border-radius:14px;font-size:.95rem}
  h2{font-family:'Mouse Memoirs',sans-serif;font-size:1.15rem;margin:18px 0 8px}
</style></head><body>
<h1>Boutons</h1>
<p class="sub">Press tactile scale(.97) · lift au survol · focus-visible anneau. Tous cliquables ici.</p>

<h2>Variantes</h2>
<div class="row">
  <button class="btn primary">Primaire</button>
  <button class="btn outline">Outline</button>
  <button class="btn ghost">Ghost</button>
  <button class="btn destructive">Destructive</button>
</div>

<h2>Spécifiques Bayen</h2>
<div class="row">
  <button class="btn pill">⌞⌝ Scanner un produit</button>
  <button class="btn whatsapp">🟢 Envoyer sur WhatsApp</button>
  <button class="btn ia">✦ Estimer avec l'IA</button>
  <button class="btn violet">✦ Générer mon bilan</button>
</div>

<h2>Tailles</h2>
<div class="row">
  <button class="btn primary sm">Small</button>
  <button class="btn primary">Default</button>
  <button class="btn primary lg">Large</button>
</div>
</body></html>
