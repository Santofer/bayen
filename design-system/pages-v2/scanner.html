<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner v2 — Bayen</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:hsl(60 40% 90%);--card:hsl(57 70% 98.5%);--fg:hsl(100 25% 12%);--muted:hsl(95 12% 42%);
    --border:hsl(62 28% 82%);--primary:hsl(97 36% 30%);--lime:#b1cf3a;--cream:#f0f2d2;
    --sh-card:0 1px 2px hsl(97 40% 20%/.06),0 3px 12px hsl(97 40% 20%/.07)}
  *{box-sizing:border-box;margin:0}
  body{font-family:Figtree,system-ui,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:44px}
  .display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.01em}
  .nav{position:sticky;top:10px;z-index:50;max-width:min(1040px,calc(100% - 20px));margin:10px auto 0;display:flex;align-items:center;gap:22px;height:56px;padding:0 22px;border-radius:999px;background:hsl(63 55% 93%/.85);border:1px solid hsl(97 36% 30%/.12);backdrop-filter:saturate(1.4) blur(14px);box-shadow:var(--sh-card)}
  .nav a{color:var(--primary);opacity:.62;text-decoration:none;font-size:.86rem;font-weight:600}
  .nav .brand{display:flex;align-items:center}
  .nav .brand img{height:30px;width:auto;display:block}
  .nav .nspace{flex:1}
  .nav .login{display:inline-flex!important;align-items:center;gap:7px;opacity:1!important;border:1px solid hsl(97 36% 30%/.3);border-radius:999px;padding:8px 16px;font-weight:700}
  .nav .scan-cta{display:inline-flex!important;align-items:center;gap:8px;opacity:1!important;background:hsl(97 36% 30%);color:#f0f2d2!important;border-radius:999px;padding:10px 18px;font-weight:700;box-shadow:0 4px 14px hsl(97 40% 20%/.25)}
  .wrap{max-width:560px;margin:30px auto 0;padding:0 16px;text-align:center}
  h1{font-size:2rem;font-weight:780}
  .sub{color:var(--muted);font-size:.9rem;margin:6px 0 22px}

  /* Viewfinder caméra */
  .cam{position:relative;aspect-ratio:4/4.6;border-radius:28px;overflow:hidden;background:
    radial-gradient(420px 300px at 50% 42%, hsl(100 18% 26%), hsl(100 24% 14%));box-shadow:var(--sh-card)}
  .frame{position:absolute;inset:0;margin:auto;width:72%;height:44%}
  .frame i{position:absolute;width:38px;height:38px;border:4px solid var(--lime);border-radius:10px}
  .frame i:nth-child(1){top:0;left:0;border-right:0;border-bottom:0}
  .frame i:nth-child(2){top:0;right:0;border-left:0;border-bottom:0}
  .frame i:nth-child(3){bottom:0;left:0;border-right:0;border-top:0}
  .frame i:nth-child(4){bottom:0;right:0;border-left:0;border-top:0}
  .beam{position:absolute;left:6%;right:6%;height:3px;border-radius:99px;background:linear-gradient(90deg,transparent,var(--lime),transparent);
    box-shadow:0 0 18px var(--lime);animation:sweep 2.1s ease-in-out infinite}
  @keyframes sweep{0%,100%{top:12%}50%{top:84%}}
  .cam .hint{position:absolute;left:0;right:0;bottom:18px;color:hsl(60 40% 92%/.85);font-size:.85rem}
  .torch{position:absolute;top:14px;right:14px;width:42px;height:42px;border-radius:999px;background:hsl(60 40% 96%/.14);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;color:#fff}

  .or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.76rem;margin:20px 0 12px}
  .or::before,.or::after{content:'';flex:1;height:1px;background:var(--border)}
  .manual{display:flex;gap:10px}
  .manual input{flex:1;border:1px solid var(--border);background:var(--card);border-radius:14px;padding:13px 16px;font-family:inherit;font-size:.95rem;letter-spacing:.12em}
  .manual button{background:var(--primary);color:var(--cream);border:0;border-radius:14px;padding:0 22px;font-family:inherit;font-weight:700;cursor:pointer}
  .recent{margin-top:26px;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px 20px;box-shadow:var(--sh-card)}
  .recent h3{font-size:.95rem;font-weight:750;margin-bottom:10px}
  .rline{display:flex;align-items:center;gap:11px;padding:8px 0;border-top:1px solid var(--border);font-size:.86rem}
  .rline .sc{width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.66rem;flex-shrink:0}
</style></head><body>

<nav class="nav"><a class="brand" href="#"><img src="../assets/logo-bayen.svg" alt="Bayen"></a><a href="#">Recherche</a><a href="#">Comparer</a><a href="#">Mon repas</a><a href="#">Additifs</a><a href="#">Blog</a><span class="nspace"></span><a class="login" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Se connecter</a><a class="scan-cta" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg> Scanner</a></nav>

<main class="wrap">
  <h1 class="display">Scanner un produit</h1>
  <div class="sub">Vise le code-barres — le score s'affiche en 3 secondes.</div>

  <div class="cam">
    <div class="torch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:19px;height:19px"><path d="M8 2h8l2 5-6 3-6-3 2-5Z"/><path d="M12 10v12"/></svg></div>
    <div class="frame"><i></i><i></i><i></i><i></i><div class="beam"></div></div>
    <div class="hint">Cadre le code-barres dans la zone</div>
  </div>

  <div class="or">ou saisis le code</div>
  <div class="manual"><input placeholder="6111245000558"><button>Chercher</button></div>

  <div class="recent">
    <h3 class="display">Scans récents</h3>
    <div class="rline" style="border-top:0"><span class="sc" style="background:#b1cf3a">80</span> Semoule fine <span style="margin-left:auto;color:var(--muted);font-size:.74rem">il y a 2 min</span></div>
    <div class="rline"><span class="sc" style="background:#ef4444">18</span> Nutella <span style="margin-left:auto;color:var(--muted);font-size:.74rem">hier</span></div>
    <div class="rline"><span class="sc" style="background:#476a32">100</span> Flocons d'avoine <span style="margin-left:auto;color:var(--muted);font-size:.74rem">hier</span></div>
  </div>
</main>
</body></html>
