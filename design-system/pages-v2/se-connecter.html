<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Se connecter v2 — Bayen</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:hsl(60 40% 90%);--card:hsl(57 70% 98.5%);--fg:hsl(100 25% 12%);--muted:hsl(95 12% 42%);
    --border:hsl(62 28% 82%);--primary:hsl(97 36% 30%);--lime:#b1cf3a;--cream:#f0f2d2;
    --sh-card:0 1px 2px hsl(97 40% 20%/.06),0 3px 12px hsl(97 40% 20%/.07);
    --sh-lift:0 2px 4px hsl(97 40% 20%/.06),0 12px 28px hsl(97 40% 20%/.14);--spring:cubic-bezier(.34,1.3,.5,1)}
  *{box-sizing:border-box;margin:0}
  body{font-family:Figtree,system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;
    background-image:radial-gradient(900px 520px at 50% -160px,hsl(68 62% 50%/.20),transparent 70%);background-repeat:no-repeat;
    display:flex;align-items:center;justify-content:center;padding:32px 16px}
  .display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.01em}

  .card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:28px;padding:34px 30px;box-shadow:var(--sh-lift)}
  .brand{display:flex;justify-content:center;margin-bottom:22px}
  .brand img{height:38px}
  h1{font-size:1.7rem;font-weight:780;text-align:center;line-height:1.1}
  .sub{color:var(--muted);font-size:.9rem;text-align:center;margin:6px 0 24px}

  .social{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--border);background:var(--bg);border-radius:14px;padding:13px;font-family:inherit;font-weight:600;font-size:.95rem;cursor:pointer;color:inherit;transition:transform .2s var(--spring),box-shadow .2s}
  .social:hover{transform:translateY(-1px);box-shadow:var(--sh-card)}
  .social svg{width:20px;height:20px}
  .or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.74rem;margin:18px 0}
  .or::before,.or::after{content:'';flex:1;height:1px;background:var(--border)}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:.8rem;font-weight:600;margin-bottom:6px}
  .input{display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:var(--bg);border-radius:12px;padding:0 14px}
  .input:focus-within{border-color:var(--primary)}
  .input svg{width:18px;height:18px;color:var(--muted);flex-shrink:0}
  .input input{flex:1;border:0;background:transparent;font-family:inherit;font-size:.95rem;color:inherit;outline:none;padding:13px 0}
  .row{display:flex;justify-content:space-between;align-items:center;margin:2px 0 18px;font-size:.8rem}
  .row a{color:var(--primary);text-decoration:none;font-weight:600}
  .submit{width:100%;background:var(--primary);color:var(--cream);border:0;border-radius:14px;padding:15px;font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .2s var(--spring)}
  .submit:hover{transform:translateY(-1px)}
  .foot{text-align:center;font-size:.86rem;color:var(--muted);margin-top:20px}
  .foot a{color:var(--primary);font-weight:700;text-decoration:none}
  .legal{text-align:center;font-size:.72rem;color:var(--muted);margin-top:16px;line-height:1.5}
  .legal a{color:var(--muted);text-decoration:underline}
</style></head><body>

<main class="card">
  <div class="brand"><img src="../assets/logo-bayen.svg" alt="Bayen"></div>
  <h1 class="display">Bon retour 👋</h1>
  <div class="sub">Connecte-toi pour retrouver ton journal, ton panier et ton rang.</div>

  <button class="social">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09Z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84Z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38Z"/></svg>
    Continuer avec Google
  </button>

  <div class="or">ou par email</div>

  <form onsubmit="return false">
    <div class="field"><label>Email</label>
      <div class="input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
        <input type="email" placeholder="toi@exemple.ma">
      </div>
    </div>
    <div class="field"><label>Mot de passe</label>
      <div class="input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" placeholder="••••••••">
      </div>
    </div>
    <div class="row"><span></span><a href="#">Mot de passe oublié ?</a></div>
    <button class="submit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1.1em;height:1.1em"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/></svg> Se connecter</button>
  </form>

  <div class="foot">Pas encore de compte ? <a href="#">Créer un compte</a></div>
  <div class="legal">En continuant, tu acceptes nos <a href="#">Conditions</a> et notre <a href="#">Politique de confidentialité</a>.</div>
</main>
</body></html>
