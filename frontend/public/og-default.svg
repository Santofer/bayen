<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#476a32"/>
      <stop offset="1" stop-color="#2a3f1e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff14" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Wordmark Bayen (texte stylisé en gros) -->
  <text x="600" y="240" font-family="Georgia, serif" font-size="180" font-weight="900"
        fill="#b1cf3a" text-anchor="middle" letter-spacing="-4">Bayen</text>

  <!-- Tagline FR -->
  <text x="600" y="330" font-family="Helvetica, Arial, sans-serif" font-size="48"
        font-weight="700" fill="#f0f2d2" text-anchor="middle">
    Scannez. Comprenez. Choisissez mieux.
  </text>

  <!-- Sous-tagline darija -->
  <text x="600" y="395" font-family="Helvetica, Arial, sans-serif" font-size="32"
        fill="#f0f2d2cc" text-anchor="middle" direction="rtl">
    سكان. فهم. اختار حسن.
  </text>

  <!-- Badge bottom -->
  <g transform="translate(600,500)">
    <rect x="-280" y="-32" width="560" height="64" rx="32" fill="#b1cf3a"/>
    <text x="0" y="10" font-family="Helvetica, Arial, sans-serif" font-size="26"
          font-weight="700" fill="#2a3f1e" text-anchor="middle" letter-spacing="0.05em">
      100% GRATUIT · OPEN SOURCE · MAROC
    </text>
  </g>

  <!-- URL -->
  <text x="600" y="595" font-family="Helvetica, Arial, sans-serif" font-size="22"
        fill="#f0f2d2aa" text-anchor="middle" letter-spacing="0.1em">
    bayen.ma
  </text>
</svg>
