# Bayen — Docker Compose
# Services : Directus, PostgreSQL, Ollama (GPU M4000), Tesseract (CPU)
# Tesseract et Ollama ne sont jamais exposés publiquement — réseau Docker interne uniquement.

services:
  bayen-postgres:
    image: postgres:16-alpine
    container_name: bayen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bayen}
      POSTGRES_USER: ${POSTGRES_USER:-bayen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
    volumes:
      - /mnt/cache/appdata/bayen/data/postgres:/var/lib/postgresql/data
    networks:
      - bayen-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bayen_user} -d ${POSTGRES_DB:-bayen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bayen-directus:
    image: directus/directus:11
    container_name: bayen-directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      # Base de données
      DB_CLIENT: pg
      DB_HOST: bayen-postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-bayen}
      DB_USER: ${POSTGRES_USER:-bayen_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}

      # Directus
      SECRET: ${DIRECTUS_SECRET:?DIRECTUS_SECRET requis}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@n0.ma}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:?DIRECTUS_ADMIN_PASSWORD requis}
      PUBLIC_URL: ${DIRECTUS_URL:-https://api.bayen.ma}

      # Stockage R2 (S3-compatible)
      STORAGE_LOCATIONS: r2
      STORAGE_R2_DRIVER: s3
      STORAGE_R2_KEY: ${R2_ACCESS_KEY_ID}
      STORAGE_R2_SECRET: ${R2_SECRET_ACCESS_KEY}
      STORAGE_R2_BUCKET: ${R2_BUCKET:-bayen-products}
      STORAGE_R2_ENDPOINT: ${R2_ENDPOINT}
      STORAGE_R2_REGION: auto
      STORAGE_R2_FORCE_PATH_STYLE: "true"

      # Limites
      MAX_PAYLOAD_SIZE: 5mb
    volumes:
      - /mnt/cache/appdata/bayen/data/directus-uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
      - ./directus/snapshots:/directus/snapshots
    networks:
      - bayen-internal
    depends_on:
      bayen-postgres:
        condition: service_healthy

  bayen-ollama:
    image: ollama/ollama:latest
    container_name: bayen-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_GPU=1
    volumes:
      - /mnt/cache/appdata/bayen/data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - bayen-internal

  bayen-tesseract:
    build:
      context: ./tesseract-api
      dockerfile: Dockerfile
    container_name: bayen-tesseract
    restart: unless-stopped
    ports:
      - "5055:5000"
    environment:
      # IA : serveur vLLM partagé (OpenAI-compatible), Qwen3.5-9B multimodal.
      # IP LAN directe (le container bridge atteint l'hôte LAN), pas host.docker.internal.
      AI_BASE_URL: http://192.168.1.123:8000/v1
      AI_MODEL: qwen3.5-9b
      AI_API_KEY: sk-local
    networks:
      - bayen-internal

networks:
  bayen-internal:
    name: bayen-internal
    driver: bridge
